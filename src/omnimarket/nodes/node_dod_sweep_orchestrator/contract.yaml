---
name: node_dod_sweep_orchestrator
contract_version: {major: 1, minor: 0, patch: 0}
node_type: orchestrator
node_version: {major: 1, minor: 0, patch: 0}
description: >
  Orchestrates targeted DoD sweep receipt generation for tickets.

handler:
  module: omnimarket.nodes.node_dod_sweep_orchestrator.handlers.handler_dod_sweep_orchestrator
  class: HandlerDodSweepOrchestrator
  input_model: omnimarket.nodes.node_dod_sweep_orchestrator.models.model_dod_sweep_orchestrator_request.ModelDodSweepOrchestratorRequest

env_dependencies:
  ONEX_CC_REPO_PATH:
    required: false
    description: "Path to the omni_home repo registry; used as fallback root when not resolvable from the process environment"

descriptor:
  node_archetype: orchestrator
  purity: impure
  idempotent: true
  timeout_ms: 30000
terminal_event: onex.evt.omnimarket.dod-sweep-completed.v1

config:
  ONEX_CC_REPO_PATH:
    description: "Path to the omniclaude repository for Claude Code plugin operations."
    required: false
