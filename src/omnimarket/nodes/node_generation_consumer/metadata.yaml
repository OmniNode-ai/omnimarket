name: node_generation_consumer
version: "1.0.0"
description: "Generates ONEX compute nodes from natural language via LLM, validates output, emits benchmark and hot-deploy events"
omnibase_core_compat: ">=0.40.1,<0.42.0"
entry_points:
  onex.nodes:
    node_generation_consumer: "omnimarket.nodes.node_generation_consumer"
capabilities:
  standalone: true
  full_runtime: true
  requires_network: true
  requires_repo: false
  requires_secrets: true
  requires_docker: false
  side_effect_class: effect
dependencies:
  - "omnibase_core>=0.40.1,<0.42.0"
  - "omnibase-infra>=0.1.0"
authors: ["OmniNode Platform Team"]
license: "MIT"
tags: ["generation", "llm", "node-creation", "hackathon", "mcp"]
pack: "generation"
display_name: "Node Generation Consumer"
node_role: "orchestrator"
