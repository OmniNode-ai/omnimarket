---
# models_registry.yaml — A/B compare model registry.
#
# endpoint is the default OpenAI-compatible base URL. endpoint_env can override
# it at runtime; blank env values are treated as unset and fall back to endpoint.
# model_id_env names the env var that supplies the model identifier at runtime.
# model_id_default is the fallback when the env var is unset; "" means skip the
# model rather than using a hardcoded ID.
# protocol must currently be openai_compatible for orchestrator execution.
# requires_key names the API-key env var; models with missing keys are skipped.

schema_version: "1.0.0"
models:
  - id: qwen3-coder-30b
    display_name: "Qwen3-Coder-30B"
    endpoint: "http://192.168.86.201:8000"  # onex-allow-internal-ip OMN-10580 reason="lab default; override via endpoint_env=LLM_CODER_URL"
    endpoint_env: LLM_CODER_URL
    protocol: openai_compatible
    model_id_env: LLM_CODER_MODEL_NAME
    model_id_default: ""
    cost_per_1k_input: 0.0
    cost_per_1k_output: 0.0
    location: local
    context_window: 112000

  - id: deepseek-r1-14b
