---
# models_registry.yaml — A/B compare model registry.
#
# OMN-10645: per-entry `endpoint:` LAN literals removed. The handler reads
# `endpoint_env` at runtime; if the named env var is unset/empty AND no
# `endpoint:` literal is declared (the case for all local lab models), the
# orchestrator skips that model with a clear log line. Cloud entries with a
# stable public URL (e.g. GLM) keep an `endpoint:` literal.
#
# endpoint_env names the env var that supplies the OpenAI-compatible base URL.
# model_id_env names the env var that supplies the model identifier.
# model_id_default is the fallback when the env var is unset; "" = skip the
# model rather than using a hardcoded ID.
# protocol must currently be openai_compatible for orchestrator execution.
# requires_key names the API-key env var; models with missing keys are skipped.

schema_version: "1.0.0"
models:
  - id: qwen3-coder-30b
    display_name: "Qwen3-Coder-30B"
    endpoint_env: LLM_CODER_URL
    protocol: openai_compatible
    model_id_env: LLM_CODER_MODEL_NAME
    model_id_default: ""
    cost_per_1k_input: 0.0
    cost_per_1k_output: 0.0
    location: local
    context_window: 112000

  - id: deepseek-r1-14b
    display_name: "DeepSeek-R1-14B"
    endpoint_env: LLM_CODER_FAST_URL
    protocol: openai_compatible
    model_id_env: LLM_CODER_FAST_MODEL_NAME
    model_id_default: ""
    cost_per_1k_input: 0.0
    cost_per_1k_output: 0.0
    location: local
    context_window: 24000

  - id: deepseek-r1-32b
    display_name: "DeepSeek-R1-32B"
    endpoint_env: LLM_DEEPSEEK_R1_URL
    protocol: openai_compatible
    model_id_env: LLM_DEEPSEEK_R1_MODEL_NAME
    model_id_default: ""
    cost_per_1k_input: 0.0
    cost_per_1k_output: 0.0
    location: local
    context_window: 8192

  - id: qwen3-next-80b
    display_name: "Qwen3-Next-80B"
    endpoint_env: LLM_QWEN3_NEXT_URL
    protocol: openai_compatible
    model_id_env: LLM_QWEN3_NEXT_MODEL_NAME
    model_id_default: ""
    cost_per_1k_input: 0.0
    cost_per_1k_output: 0.0
    location: local
    context_window: 8192

  - id: glm-4.5
    display_name: "z.ai GLM-4.5"
    endpoint: "https://api.z.ai/api/coding/paas/v4"
    endpoint_env: LLM_GLM_URL
    protocol: openai_compatible
    model_id: "glm-4.5"
    model_id_env: LLM_GLM_MODEL_NAME
    cost_per_1k_input: 0.0005
    cost_per_1k_output: 0.0005
    location: cloud
    requires_key: LLM_GLM_API_KEY
    context_window: 131072
