---
name: pr_lifecycle_orchestrator
contract_version: {major: 1, minor: 0, patch: 0}
node_type: orchestrator
node_version: {major: 1, minor: 0, patch: 0}

description: >
  FSM orchestrator composing 5 pr_lifecycle sub-handlers via a state reducer.
  Single entry point that replaces the merge_sweep orchestration logic.

  Sub-handlers (injected via protocol-based DI):
    - ProtocolInventoryHandler     (node_pr_lifecycle_inventory_compute)
    - ProtocolTriageHandler        (node_pr_lifecycle_triage_compute)
    - ProtocolMergeHandler         (node_pr_lifecycle_merge_effect)
    - ProtocolFixHandler           (node_pr_lifecycle_fix_effect)
    - ProtocolStateReducerHandler  (node_pr_lifecycle_state_reducer)

  FSM: IDLE -> INVENTORYING -> TRIAGING -> [REBASING|MERGING|FIXING|SKIPPED] -> COMPLETE
  Entry flags control which transitions are enabled:
    dry_run, inventory_only, fix_only, merge_only, enable_auto_rebase, repos (CSV filter)

handler_routing:
  routing_strategy: operation_match
  handlers:
    - handler:
        name: HandlerPrLifecycleOrchestrator
        module: omnimarket.nodes.node_pr_lifecycle_orchestrator.handlers.handler_pr_lifecycle_orchestrator
      event_model:
        name: ModelPrLifecycleStartCommand
        module: omnimarket.nodes.node_pr_lifecycle_orchestrator.handlers.handler_pr_lifecycle_orchestrator
      # OMN-9215: wire-level event_type alias. ModelEventEnvelope[object] erases
      # the concrete payload type to dict on inbound validation, so dispatcher
      # lookup cannot match ModelPrLifecycleStartCommand via the class-name
      # fallback. This alias indexes the handler under the contract-canonical
      # dot-path that publishers emit on ModelEventEnvelope.event_type.
      event_type: omnimarket.pr-lifecycle-orchestrator-start

descriptor:
  node_archetype: orchestrator
  purity: effectful
  idempotent: false
  timeout_ms: 300000

inputs:
  correlation_id:
    type: uuid
    description: "Unique sweep run ID"
    required: true
  run_id:
    type: str
    description: >
      Human-readable sweep run identifier used as the result.json directory name
      under $ONEX_STATE_DIR/merge-sweep/{run_id}/. Restricted to [A-Za-z0-9._-].
    required: true
  dry_run:
    type: bool
    description: "Run without side effects"
    required: false
    default: false
  inventory_only:
    type: bool
    description: "Stop after inventory; no triage, merge, or fix"
    required: false
    default: false
  fix_only:
    type: bool
    description: "Only fix non-green PRs; skip merge"
    required: false
    default: false
  merge_only:
    type: bool
    description: "Only merge green PRs; skip fix"
    required: false
    default: false
  repos:
    type: str
    description: "Comma-separated repo slugs to filter (empty = all)"
    required: false
    default: ""
  max_parallel_polish:
    type: int
    description: "Maximum concurrent pr-polish agents dispatched during FIXING"
    required: false
    default: 20
    minimum: 1
  enable_auto_rebase:
    type: bool
    description: "Auto-rebase stale (Track A-update) PR branches before merge"
    required: false
    default: true
  use_dag_ordering:
    type: bool
    description: "Merge PRs in repo dependency order"
    required: false
    default: true
  enable_trivial_comment_resolution:
    type: bool
    description: "Auto-resolve trivial CodeRabbit or bot review threads before merge"
    required: false
    default: true
  enable_admin_merge_fallback:
    type: bool
    description: "Admin-merge PRs stuck in queue past the configured threshold"
    required: false
    default: true
  admin_fallback_threshold_minutes:
    type: int
    description: "Minutes before a merge-queued PR is considered stuck"
    required: false
    default: 30
  verify:
    type: bool
    description: "Run verification_sweep per-PR as pre-merge gate (OMN-7742)"
    required: false
    default: false
  verify_timeout_seconds:
    type: int
    description: "Hard per-PR verification timeout in seconds"
    required: false
    default: 30
    minimum: 1

outputs:
  prs_inventoried:
    type: int
    description: "Total PRs collected by inventory handler"
  prs_merged:
    type: int
    description: "PRs successfully merged"
  prs_fixed:
    type: int
    description: "PRs where fix was dispatched"
  prs_skipped:
    type: int
    description: "PRs skipped (not green, not fixable)"

dependencies:
  - name: "onex_occ_merge_sha"
    type: "environment"
    env_var: "ONEX_OCC_MERGE_SHA"
    required: false
    description: "OCC merge SHA override used to stamp lifecycle merge evidence when present"

sub_handler_dependencies:
  - name: inventory
    protocol: omnimarket.nodes.node_pr_lifecycle_orchestrator.protocols.protocol_sub_handlers.ProtocolInventoryHandler
    default_impl: omnimarket.nodes.node_pr_lifecycle_inventory_compute.handlers.handler_pr_lifecycle_inventory.HandlerPrLifecycleInventory
    optional: true
  - name: triage
    protocol: omnimarket.nodes.node_pr_lifecycle_orchestrator.protocols.protocol_sub_handlers.ProtocolTriageHandler
    default_impl: omnimarket.nodes.node_pr_lifecycle_triage_compute.handlers.handler_pr_lifecycle_triage.HandlerPrLifecycleTriage
    optional: true
  - name: merge
    protocol: omnimarket.nodes.node_pr_lifecycle_orchestrator.protocols.protocol_sub_handlers.ProtocolMergeHandler
    default_impl: omnimarket.nodes.node_pr_lifecycle_merge_effect.handlers.handler_pr_lifecycle_merge.HandlerPrLifecycleMerge
    optional: true
  - name: fix
    protocol: omnimarket.nodes.node_pr_lifecycle_orchestrator.protocols.protocol_sub_handlers.ProtocolFixHandler
    default_impl: omnimarket.nodes.node_pr_lifecycle_fix_effect.handlers.handler_pr_lifecycle_fix.HandlerPrLifecycleFix
    optional: true
  - name: reducer
    protocol: omnimarket.nodes.node_pr_lifecycle_orchestrator.protocols.protocol_sub_handlers.ProtocolStateReducerHandler
    default_impl: omnimarket.nodes.node_pr_lifecycle_state_reducer.handlers.handler_pr_lifecycle_state_reducer.HandlerPrLifecycleStateReducer
    optional: true

terminal_event: onex.evt.omnimarket.pr-lifecycle-orchestrator-completed.v1

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.pr-lifecycle-orchestrator-start.v1
  publish_topics:
    - onex.evt.omnimarket.pr-lifecycle-orchestrator-phase-transition.v1
    - onex.evt.omnimarket.pr-lifecycle-orchestrator-completed.v1
    - onex.evt.omnimarket.pr-lifecycle-orchestrator-failed.v1
    - onex.evt.omnimarket.pr-lifecycle-inventory-collected.v1
    - onex.evt.omnimarket.pr-lifecycle-triage-classified.v1
    - onex.evt.omnimarket.pr-lifecycle-merge-executed.v1
    - onex.evt.omnimarket.pr-lifecycle-verification-completed.v1
    - onex.evt.omnimarket.pr-lifecycle-fix-dispatched.v1
    - onex.cmd.omnimarket.fixer-dispatch-start.v1

fsm:
  states:
    - IDLE
    - INVENTORYING
    - TRIAGING
    - VERIFYING
    - REBASING
    - MERGING
    - FIXING
    - COMPLETE
    - FAILED
  initial_state: IDLE
  terminal_states:
    - COMPLETE
    - FAILED
  transitions:
    - from: IDLE
      to: INVENTORYING
      trigger: "start command received"
    - from: INVENTORYING
      to: TRIAGING
      trigger: "inventory completed"
    - from: INVENTORYING
      to: COMPLETE
      trigger: "inventory_only flag set"
    - from: TRIAGING
      to: REBASING
      trigger: "Track A-update PRs present and enable_auto_rebase=True"
    - from: TRIAGING
      to: MERGING
      trigger: "triage completed, merge not skipped, no stale PRs or rebase skipped"
    - from: TRIAGING
      to: FIXING
      trigger: "triage completed, fix_only flag set"
    - from: TRIAGING
      to: COMPLETE
      trigger: "triage completed, dry_run or no actionable PRs"
    - from: TRIAGING
      to: VERIFYING
      trigger: "verify flag set and green PRs exist"
    - from: VERIFYING
      to: MERGING
      trigger: "verification completed"
    - from: VERIFYING
      to: FAILED
      trigger: "error"
    - from: REBASING
      to: MERGING
      trigger: "rebase attempts complete"
    - from: REBASING
      to: FAILED
      trigger: "error"
    - from: MERGING
      to: FIXING
      trigger: "merge completed, not merge_only"
    - from: MERGING
      to: COMPLETE
      trigger: "merge completed, merge_only flag set"
    - from: FIXING
      to: COMPLETE
      trigger: "fix completed"
    - from: INVENTORYING
      to: FAILED
      trigger: "error"
    - from: TRIAGING
      to: FAILED
      trigger: "error"
    - from: MERGING
      to: FAILED
      trigger: "error"
    - from: FIXING
      to: FAILED
      trigger: "error"

metadata:
  transport_type: kafka
  description: "PR Lifecycle orchestrator — FSM wiring 5 sub-handlers"
  author: "OmniNode Platform Team"
  created: "2026-04-09"
  tags:
    - "orchestrator"
    - "pr-lifecycle"
    - "fsm"
    - "merge-sweep"
    - "OMN-8087"
  related_tickets:
    - "OMN-8087"
    - "OMN-8082"
    - "OMN-8083"
    - "OMN-8084"
    - "OMN-8085"
    - "OMN-8086"
    - "OMN-8070"
