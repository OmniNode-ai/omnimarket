name: node_navigation_history_reducer
version: "0.1.0"
description: "Reduces navigation session history into queryable memory records"
omnibase_core_compat: ">=0.39.0,<1.0.0"
entry_points:
  onex.nodes:
    node_navigation_history_reducer: "omnimarket.nodes.node_navigation_history_reducer"
capabilities:
  standalone: false
  full_runtime: true
  requires_network: true
  requires_repo: false
  requires_secrets: true
  requires_docker: false
  side_effect_class: write
dependencies:
  - "omnibase_core>=0.39.0"
  - "asyncpg>=0.30.0"
  - "httpx>=0.27.0"
  - "omninode-memory>=0.1.0"
  - "qdrant-client"
  - "structlog"
authors: ["OmniNode Platform Team"]
license: "MIT"
tags: ["memory", "navigation", "history", "reducer"]
pack: "memory"
display_name: "Navigation History Reducer"
node_role: "reducer"
