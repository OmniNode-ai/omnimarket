---
# ONEX Contract: node_navigation_history_reducer
# Reduces navigation history events into aggregated session context

name: node_navigation_history_reducer
contract_version: {major: 0, minor: 1, patch: 0}
node_version: {major: 0, minor: 1, patch: 0}
node_type: reducer
input_model: "ModelNavigationHistoryRequest"
output_model: "ModelNavigationHistoryResponse"
description: |
  Reduces navigation history events into aggregated session context.
  Requires pg_dsn, qdrant, and embedding parameters at runtime.

handler:
  module: omnimarket.nodes.node_navigation_history_reducer.handlers.handler_navigation_history_reducer
  class: HandlerNavigationHistoryReducer

handler_config:
  handler_class: "HandlerNavigationHistoryReducer"
  handler_module: "omnimarket.nodes.node_navigation_history_reducer.handlers.handler_navigation_history_reducer"

env_dependencies:
  LLM_EMBEDDING_URL:
    required: false
    description: "Embedding model endpoint URL (OpenAI-compatible /v1/embeddings)"
  QDRANT_HOST:
    required: false
    description: "Qdrant host for navigation history vector storage. Node is a no-op when unset."
  QDRANT_PORT:
    required: false
    description: "Qdrant port (default 6333)."
  OMNIMEMORY_PG_DSN:
    required: false
    description: "PostgreSQL DSN for navigation history persistence; module-level default used when not provided via DI"

tags:
  - memory
  - reducer
  - navigation

config:
  OMNIMEMORY_PG_DSN:
    description: "PostgreSQL DSN for navigation history persistence."
    required: false
  QDRANT_HOST:
    description: "Qdrant host for navigation history vector storage."
    required: false
  QDRANT_PORT:
    description: "Qdrant port (default 6333)."
    required: false
  LLM_EMBEDDING_URL:
    description: "Embedding model endpoint URL."
    required: false
