principle_code: ARCH-001
name: no_hardcoded_persistence_in_runners
violation_category: runtime_topology
severity: ERROR
enforcement_surfaces:
  - static_architecture
  - ci_gate
description: >
  Runner and orchestrator modules must not contain direct persistence calls
  (session.add, session.commit, db.execute). Persistence belongs in dedicated
  effect handlers behind the ONEX node boundary.
violation_examples:
  - "session.add(model)  # in a runner module"
  - "session.commit()  # in an orchestrator"
runtime_scope: runner
