  - ci_gate
  - pre_tool_use
description: >
  os.environ.get() calls with non-empty default values silently pick a wrong
  default when the env var is missing. Use os.environ["KEY"] (fail-fast) instead.
  Annotate genuine graceful-degradation sites with # fallback-ok: <reason>.
violation_examples:
  - 'os.environ.get("OMNI_HOME", "/some/default")'
  - 'os.environ.get("DB_HOST", "localhost")'
