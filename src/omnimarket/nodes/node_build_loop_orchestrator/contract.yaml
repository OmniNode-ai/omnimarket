---
name: build_loop_orchestrator
contract_version: {major: 1, minor: 0, patch: 0}
node_type: orchestrator
node_version: {major: 1, minor: 0, patch: 0}

description: >
  Top-level orchestrator composing 6 sub-handlers via FSM reducer. Takes
  protocol-based ProtocolCloseoutHandler, ProtocolVerifyHandler,
  ProtocolRsdFillHandler, ProtocolTicketClassifyHandler,
  ProtocolBuildDispatchHandler, plus the HandlerBuildLoop FSM. Emits phase
  transition events. Synchronous sub-handler calls, in-process state ownership.

  FSM: IDLE -> CLOSING_OUT -> VERIFYING -> FILLING -> CLASSIFYING -> BUILDING -> COMPLETE
  Circuit breaker trips after 3 consecutive failures -> FAILED.

handler_routing:
  routing_strategy: operation_match
  handlers:
    - handler:
        name: HandlerBuildLoopOrchestrator
        module: omnimarket.nodes.node_build_loop_orchestrator.handlers.handler_build_loop_orchestrator
      event_model:
        name: ModelOrchestratorStartCommand
        module: omnimarket.nodes.node_build_loop_orchestrator.models.model_orchestrator_start_command

descriptor:
  node_archetype: orchestrator
  purity: effectful
  runtime_profiles:
    - effects
  idempotent: false
  timeout_ms: 300000

inputs:
  correlation_id:
    type: uuid
    description: "Unique cycle ID"
    required: true
  max_cycles:
    type: int
    description: "Maximum number of build loop cycles to run"
    required: false
    default: 1
  skip_closeout:
    type: bool
    description: "Skip the CLOSING_OUT phase"
    required: false
    default: false
  dry_run:
    type: bool
    description: "Run without side effects"
    required: false
    default: false

outputs:
  cycles_completed:
    type: int
    description: "Number of cycles that completed successfully"
  cycles_failed:
    type: int
    description: "Number of cycles that failed"
  total_tickets_dispatched:
    type: int
    description: "Total tickets dispatched across all cycles"

env_dependencies:
  LLM_CODER_URL:
    required: false
    description: "vLLM Qwen3-Coder-30B endpoint URL (primary coder model)"
  LLM_CODER_FAST_URL:
    required: false
    description: "vLLM fast/reasoning model endpoint URL (used for ticket classification)"
  LLM_GLM_URL:
    required: false
    description: "GLM cloud API base URL (cloud fallback)"
  LLM_GLM_MODEL_NAME:
    required: false
    description: "GLM model name to use with LLM_GLM_URL"
  LLM_DEEPSEEK_R1_URL:
    required: false
    description: "DeepSeek-R1 reasoning model endpoint URL (judge/reasoning tasks)"
  BUILD_LOOP_OUTPUT_DIR:
    required: false
    description: "Directory path for build loop output artifacts (defaults to empty string)"
  LINEAR_TEAM_ID:
    required: false
    description: "Linear team ID used by adapter_linear_fill for ticket queries"
  LINEAR_TEAM_KEY:
    required: false
    description: "Linear team key used by adapter_linear_fill (defaults to 'OMN')"
  LINEAR_ACTIVE_SPRINT_PROJECT_ID:
    required: false
    description: "Linear project ID for the active sprint; used to filter tickets"
  OMNI_WORKTREES_ROOT:
    required: false
    description: "Root directory for git worktrees; used by assemble_live to locate per-ticket worktrees"

config:
  LLM_CODER_URL:
    description: "vLLM Qwen3-Coder-30B endpoint URL (primary coder model)"
    required: false
  LLM_CODER_FAST_URL:
    description: "vLLM fast model endpoint URL (ticket classification)"
    required: false
  LLM_GLM_URL:
    description: "GLM cloud API base URL (cloud fallback)"
    required: false
  LLM_GLM_MODEL_NAME:
    description: "GLM model name to use with LLM_GLM_URL"
    required: false
  LLM_DEEPSEEK_R1_URL:
    description: "DeepSeek-R1 reasoning model endpoint URL"
    required: false
  BUILD_LOOP_OUTPUT_DIR:
    description: "Directory path for build loop output artifacts"
    required: false
  LINEAR_TEAM_ID:
    description: "Linear team ID for ticket queries"
    required: false
  LINEAR_TEAM_KEY:
    description: "Linear team key (defaults to 'OMN')"
    required: false
  LINEAR_ACTIVE_SPRINT_PROJECT_ID:
    description: "Linear project ID for the active sprint; used to filter tickets"
    required: false
  OMNI_WORKTREES_ROOT:
    description: "Root directory for git worktrees; used by assemble_live to locate per-ticket worktrees"
    required: false

sub_handler_dependencies:
  - name: closeout
    protocol: omnimarket.nodes.node_build_loop_orchestrator.protocols.protocol_sub_handlers.ProtocolCloseoutHandler
    default_impl: omnimarket.nodes.node_closeout_effect.handlers.handler_closeout.HandlerCloseout
    optional: true
  - name: verify
    protocol: omnimarket.nodes.node_build_loop_orchestrator.protocols.protocol_sub_handlers.ProtocolVerifyHandler
    default_impl: omnimarket.nodes.node_verify_effect.handlers.handler_verify.HandlerVerify
    optional: true
  - name: rsd_fill
    protocol: omnimarket.nodes.node_build_loop_orchestrator.protocols.protocol_sub_handlers.ProtocolRsdFillHandler
    default_impl: omnimarket.nodes.node_rsd_fill_compute.handlers.handler_rsd_fill.HandlerRsdFill
    optional: true
  - name: classify
    protocol: omnimarket.nodes.node_build_loop_orchestrator.protocols.protocol_sub_handlers.ProtocolTicketClassifyHandler
    default_impl: omnimarket.nodes.node_ticket_classify_compute.handlers.handler_ticket_classify.HandlerTicketClassify
    optional: true
  - name: dispatch
    protocol: omnimarket.nodes.node_build_loop_orchestrator.protocols.protocol_sub_handlers.ProtocolBuildDispatchHandler
    default_impl: omnimarket.nodes.node_build_dispatch_effect.handlers.handler_build_dispatch.HandlerBuildDispatch
    optional: true

terminal_event: onex.evt.omnimarket.build-loop-orchestrator-completed.v1

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.build-loop-orchestrator-start.v1
    # Canonical topic from node_overseer_verifier/contract.yaml (OMN-8025)
    - onex.evt.omnimarket.overseer-verifier-completed.v1
  publish_topics:
    - onex.evt.omnimarket.build-loop-orchestrator-phase-transition.v1
    - onex.evt.omnimarket.build-loop-orchestrator-completed.v1
    - onex.evt.omnimarket.delegation-attempt.v1
    - onex.evt.omnimarket.delegation-metrics.v1
    - onex.evt.omnimarket.build-loop-started.v1
    - onex.evt.omnimarket.build-loop-fill-completed.v1
    - onex.evt.omnimarket.build-loop-classify-completed.v1
    - onex.evt.omnimarket.build-loop-closeout-completed.v1
    - onex.evt.omnimarket.build-loop-build-completed.v1
    - onex.evt.omnimarket.build-loop-failed.v1
    - onex.evt.omnimarket.build-loop-dod-checked.v1
    # Canonical topic from node_overseer_verifier/contract.yaml (OMN-8025)
    - onex.cmd.omnimarket.overseer-verify.v1

fsm:
  states:
    - IDLE
    - CLOSING_OUT
    - VERIFYING
    - FILLING
    - CLASSIFYING
    - BUILDING
    - COMPLETE
    - FAILED
  initial_state: IDLE
  terminal_states:
    - COMPLETE
    - FAILED
  transitions:
    - from: IDLE
      to: CLOSING_OUT
      trigger: "start command received"
    - from: IDLE
      to: VERIFYING
      trigger: "start command with skip_closeout"
    - from: CLOSING_OUT
      to: VERIFYING
      trigger: "closeout completed"
    - from: VERIFYING
      to: FILLING
      trigger: "verification passed"
    - from: FILLING
      to: CLASSIFYING
      trigger: "fill completed"
    - from: CLASSIFYING
      to: BUILDING
      trigger: "classification completed"
    - from: BUILDING
      to: COMPLETE
      trigger: "build dispatch completed"
    - from: CLOSING_OUT
      to: FAILED
      trigger: "error"
    - from: VERIFYING
      to: FAILED
      trigger: "error"
    - from: FILLING
      to: FAILED
      trigger: "error"
    - from: CLASSIFYING
      to: FAILED
      trigger: "error"
    - from: BUILDING
      to: FAILED
      trigger: "error"

metadata:
  transport_type: kafka
  description: "Build loop orchestrator composing 6 sub-handlers via FSM reducer"
  author: "OmniNode Platform Team"
  created: "2026-04-07"
  tags:
    - "orchestrator"
    - "build-loop"
    - "fsm"
    - "workflow"
    - "OMN-7583"
    - "OMN-7575"
  related_tickets:
    - "OMN-7583"
    - "OMN-7575"
    - "OMN-5113"
    - "OMN-8025"
