---
name: session_phase_orchestrator
contract_version: {major: 1, minor: 0, patch: 0}
node_type: orchestrator
node_version: {major: 1, minor: 0, patch: 0}

description: >
  Tick-driven orchestrator for session phase lifecycle. Receives evaluation results
  from node_session_phase_evaluator and routes them to the correct downstream command:
  transition_required -> SESSION_PHASE_TRANSITION, halt_required -> SESSION_HALT_REQUIRED,
  no_action -> no events. Emits intents only — never returns result payloads.

handler:
  module: omnimarket.nodes.node_session_phase_orchestrator.handlers.handler_session_phase_orchestrator
  class: HandlerSessionPhaseOrchestrator
  input_model: omnimarket.nodes.node_session_phase_orchestrator.models.model_orchestrator_input.ModelSessionPhaseOrchestratorInput

descriptor:
  node_archetype: orchestrator
  purity: impure
  idempotent: true
  timeout_ms: 10000
  runtime_profiles:
    - effects

terminal_event: onex.evt.omnimarket.session-orchestrator-tick-completed.v1

event_bus:
  subscribe_topics:
    - onex.evt.omnimarket.session-phase-evaluated.v1
  publish_topics:
    - onex.cmd.omnimarket.session-phase-transition.v1
    - onex.cmd.omnimarket.session-halt-required.v1
    - onex.evt.omnimarket.session-orchestrator-tick-completed.v1

dod_evidence:
  PYTEST:
    description: "session phase orchestrator unit tests"
    command: "uv run pytest tests/unit/nodes/node_session_phase_orchestrator/ -q"
    pass_criteria: "all 4 tests pass"

metadata:
  transport_type: kafka
