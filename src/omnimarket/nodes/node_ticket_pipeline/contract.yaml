---
name: ticket_pipeline
contract_version: {major: 1, minor: 0, patch: 0}
node_type: compute
node_version: {major: 1, minor: 0, patch: 0}

description: >
  Per-ticket execution pipeline WorkflowPackage. This first market-owned slice
  executes PRE_FLIGHT deterministically, compiles an IMPLEMENT dispatch-worker
  prompt without spawning an agent, and blocks later side-effect phases as not
  implemented until they are explicitly wired.

handler:
  module: omnimarket.nodes.node_ticket_pipeline.handlers.handler_ticket_pipeline
  class: HandlerTicketPipeline
  input_model: omnimarket.nodes.node_ticket_pipeline.models.model_pipeline_start_command.ModelPipelineStartCommand

descriptor:
  node_archetype: compute
  purity: pure
  idempotent: true
  timeout_ms: 600000

inputs:
  ticket_id:
    type: str
    description: "Linear ticket ID (e.g. OMN-1234)"
    required: true
  skip_test_iterate:
    type: bool
    description: "Skip the TEST_ITERATE phase"
    required: false
    default: false
  dry_run:
    type: bool
    description: "Run without side effects"
    required: false
    default: false
  skip_to:
    type: str
    description: "Validated resume phase for the bounded pipeline slice"
    required: false
    default: null

outputs:
  final_phase:
    type: str
    description: "Terminal phase reached (blocked for unwired phases)"
  phase_results:
    type: list
    description: "Explicit phase execution results emitted by the bounded slice"

terminal_event: onex.evt.omnimarket.ticket-pipeline-completed.v1

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.ticket-pipeline-start.v1
  publish_topics:
    - onex.evt.omnimarket.ticket-pipeline-phase-transition.v1
    - onex.evt.omnimarket.ticket-pipeline-completed.v1
