---
name: session_bootstrap
contract_version: {major: 2, minor: 0, patch: 0}
node_type: orchestrator
node_version: {major: 2, minor: 0, patch: 0}

description: >
  Session bootstrapper v2. Reads session inputs, writes contract snapshot to
  .onex_state/, creates required CronCreate jobs idempotently (checks CronList
  before creating — no duplicates), registers post-tick verifier, and emits
  session-bootstrap-completed.v2. Runs FIRST each session.

handler:
  module: omnimarket.nodes.node_session_bootstrap.handlers.handler_session_bootstrap
  class: HandlerSessionBootstrap
  input_model: omnimarket.nodes.node_session_bootstrap.handlers.handler_session_bootstrap.ModelBootstrapCommand

descriptor:
  node_archetype: orchestrator
  purity: impure
  # idempotent with respect to cron registration: handler checks CronList before
  # calling CronCreate — does not create duplicate crons on re-run. State files
  # (.onex_state/session-crons-*.json) are overwritten, not appended. (C5 fix)
  idempotent: true
  timeout_ms: 30000

inputs:
  session_id:
    type: uuid
    description: "Unique session ID (caller generates)"
    required: true
  contract:
    type: object
    description: "ModelSessionContract — session-level verification contract"
    required: true
  session_mode:
    type: str
    description: "Controls which crons are activated: build | close-out | reporting"
    required: false
    default: "build"
    enum: [build, close-out, reporting]
  active_sprint_id:
    type: str
    description: "Linear cycle ID, or 'auto-detect' to query Linear for active sprint"
    required: false
    default: "auto-detect"
  model_routing_preference:
    type: str
    description: "Routing preference passed to dogfood gate at dispatch time"
    required: false
    default: "local-first"
    enum: [local-first, frontier-only, hybrid]
  state_dir:
    type: str
    description: "Base path for contract snapshot and cron log"
    required: false
    default: ".onex_state"
  dry_run:
    type: bool
    description: "Skip filesystem writes and CronCreate when true"
    required: false
    default: false

outputs:
  session_id:
    type: str
    description: "Session ID echoed from command"
  status:
    type: str
    description: "ready | degraded | failed"
  contract_path:
    type: str
    description: "Absolute path written (or (dry-run) if dry_run)"
  crons_registered:
    type: list
    description: "List of CronJob IDs created or confirmed by bootstrap"
  warnings:
    type: list
    description: "Advisory warnings (non-fatal)"

required_crons:
  build_dispatch_pulse:
    cron_name: build-dispatch-pulse
    prompt_template_key: BUILD_DISPATCH_PULSE_PROMPT
    timeout_budget_ms: 300000
    description: >
      Pull Linear sprint, classify unworked tickets, dispatch workers via
      node_dispatch_worker (dogfood path) or Agent (fallback). Verify output
      via CronOutputVerificationRoutine after each tick.
    interval_min: 30
    active_modes: [build]
    phase: 1
    health_thresholds:
      dispatch_count_per_tick_min: 1
      condition: "if backlog_unworked_count > 0"
      failure_class: VACUOUS_PULSE

  # Phase 2 additions — not activated in v2.0
  merge_sweep:
    cron_name: merge-sweep
    prompt_template_key: MERGE_SWEEP_PROMPT
    timeout_budget_ms: 600000
    description: >
      Trigger pr_lifecycle_orchestrator via Kafka command topic. Monitor
      completion event. Merge green PRs.
    interval_min: 30
    active_modes: [build, close-out]
    phase: 2
    status: planned
    health_thresholds:
      must_not_timeout: true
      failure_class: MERGE_SWEEP_TIMEOUT

  overseer_verify:
    cron_name: overseer-verify
    prompt_template_key: OVERSEER_VERIFY_PROMPT
    timeout_budget_ms: 120000
    description: >
      Run 5-check overseer gate on recently-completed tickets. Escalate on
      any invariant violation.
    interval_min: 60
    active_modes: [build, close-out, reporting]
    phase: 2
    status: planned
    health_thresholds:
      overseer_escalate_count_max: 0
      failure_class: OVERSEER_VIOLATION

dogfood_gate:
  dispatch_worker_node_name: node_dispatch_worker
  dispatch_worker_entry_point: omnimarket.nodes.node_dispatch_worker
  dispatch_worker_command_topic: onex.cmd.omnimarket.dispatch-worker-start.v1
  local_model_preference: "local-first"
  log_bypass_as_dogfood_available: WARNING
  log_bypass_as_dogfood_unavailable: INFO

terminal_event: onex.evt.omnimarket.session-bootstrap-completed.v2

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.session-bootstrap-start.v2
  publish_topics:
    - onex.evt.omnimarket.session-bootstrap-completed.v2
    - onex.evt.omnimarket.session-cron-health-violation.v1
