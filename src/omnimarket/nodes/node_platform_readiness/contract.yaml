---
name: platform_readiness
contract_version: {major: 1, minor: 0, patch: 0}
node_type: compute
node_version: {major: 1, minor: 0, patch: 0}

description: >
  Unified platform readiness gate. Aggregates verification dimensions into a
  tri-state (PASS/WARN/FAIL) report with freshness-aware semantics and
  valid-zero vs broken-zero distinction.

handler:
  module: omnimarket.nodes.node_platform_readiness.handlers.handler_platform_readiness
  class: NodePlatformReadiness
  input_model: omnimarket.nodes.node_platform_readiness.handlers.handler_platform_readiness.ModelPlatformReadinessRequest

handler_routing:
  default_handler: handler:NodePlatformReadiness

descriptor:
  node_archetype: compute
  purity: pure
  idempotent: true
  timeout_ms: 60000

env_dependencies:
  ONEX_INFRA_SSH_TARGET:
    required: false
    description: "SSH target string for infrastructure checks; module-level default used when no runtime override is provided"

terminal_event: onex.evt.omnimarket.platform-readiness-completed.v1

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.platform-readiness-start.v1
    # SOW Phase 2 monitored topics — checked for producer/consumer health
    - onex.evt.savings.estimation-completed.v1
    - onex.evt.model-router.routing-decision.v1
    - onex.evt.baselines.computation-completed.v1
    - onex.evt.omnimarket.build-loop-dod-checked.v1
  publish_topics:
    - onex.evt.omnimarket.platform-readiness-completed.v1

metadata:
  transport_type: kafka

config:
  ONEX_RUNTIME_API:
    description: "ONEX runtime API endpoint URL."
    required: false
  ONEX_DASHBOARD_API:
    description: "Dashboard API endpoint URL."
    required: false
  ONEX_INFRA_SSH_TARGET:
    description: "SSH target for infrastructure commands (user@host)."
    required: false
