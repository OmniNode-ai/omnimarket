---
name: node_e2e_orchestrator
description: >
  E2E orchestrator — bridges build-loop completion to merge sweep.
  Subscribes to build-loop-orchestrator-completed, polls CI until green,
  then publishes pr-lifecycle-orchestrator-start. On merge completion,
  writes an evidence bundle to .onex_state/e2e-runs/{correlation_id}/.
node_type: orchestrator
contract_version: {major: 1, minor: 0, patch: 0}
node_version: {major: 1, minor: 0, patch: 0}

topics:
  subscribes:
    - name: onex.evt.omnimarket.build-loop-orchestrator-completed.v1
      description: Fired when build loop completes; triggers CI poll + merge sweep
    - name: onex.evt.omnimarket.pr-lifecycle-orchestrator-completed.v1
      description: Fired when merge sweep completes; triggers evidence bundle write
  publishes:
    - name: onex.cmd.omnimarket.pr-lifecycle-orchestrator-start.v1
      description: Triggers the PR lifecycle / merge sweep

descriptor:
  node_archetype: orchestrator
  purity: effectful
  runtime_profiles:
    - full_runtime
    - standalone
