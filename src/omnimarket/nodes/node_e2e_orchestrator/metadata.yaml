name: node_e2e_orchestrator
version: "1.0.0"
description: "E2E orchestrator — bridges build-loop completion to merge sweep via CI poll"
omnibase_core_compat: ">=0.39.0,<1.0.0"
pack: build
node_role: orchestrator
display_name: "E2E Orchestrator"
entry_points:
  onex.nodes:
    node_e2e_orchestrator: "omnimarket.nodes.node_e2e_orchestrator"
capabilities:
