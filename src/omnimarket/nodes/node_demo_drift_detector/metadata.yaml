name: node_demo_drift_detector
version: "1.0.0"
description: "Detect drift between current demo state and proof-of-green bundle"
omnibase_core_compat: ">=0.39.0,<1.0.0"
entry_points:
  onex.nodes:
    node_demo_drift_detector: "omnimarket.nodes.node_demo_drift_detector"
capabilities:
  standalone: true
  full_runtime: true
  requires_network: true
  requires_repo: false
  requires_secrets: false
  requires_docker: false
  side_effect_class: read_write
dependencies:
  - "omnibase_core>=0.39.0"
  - "httpx>=0.27.0"
  - "asyncpg>=0.30.0"
authors: ["OmniNode Platform Team"]
license: "MIT"
tags: ["demo", "drift", "detection", "readiness", "automation"]
pack: "demo_readiness"
display_name: "Demo Drift Detector"
node_role: "compute"
