---
name: overseer_benchmarker
contract_version: {major: 1, minor: 0, patch: 0}
node_type: compute
node_version: {major: 1, minor: 0, patch: 0}

description: >
  Continuous benchmarking harness that extends node_llm_eval_harness. Runs
  eval tasks through target models and appends scorecard rows to
  overseer_performance_ledger.jsonl for future routing decisions. Never
  reads or mutates active overseer run state — append-only side effect.

handler:
  module: omnimarket.nodes.node_overseer_benchmarker.handlers.handler_overseer_benchmarker
  class: NodeOverseerBenchmarker
  input_model: omnimarket.nodes.node_overseer_benchmarker.handlers.handler_overseer_benchmarker.BenchmarkRequest

descriptor:
  node_archetype: compute
  purity: nondeterministic
  idempotent: false
  timeout_ms: 600000

inputs:
  run_id:
    type: str
    description: "Caller-assigned ID for this benchmark run"
    required: true
  models:
    type: list[str]
    description: "Model keys to benchmark"
    required: true
  max_tasks_per_type:
    type: int
    description: "Cap tasks executed per (model, task_type) pair"
    required: false
    default: 5
  dry_run:
    type: bool
    description: "If true, skip LLM calls and emit a shaped zero-value result"
    required: false
    default: false

outputs:
  run_id:
    type: str
    description: "Echo of the caller-provided run ID"
  rows_appended:
    type: int
    description: "Number of scorecard rows written to the ledger"
  status:
    type: str
    description: "clean | partial | error | dry_run"
  dry_run:
    type: bool
    description: "Echo of the dry_run flag from the request"

terminal_event: onex.evt.omnimarket.overseer-benchmarker-completed.v1

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.overseer-benchmarker-start.v1
  publish_topics:
    - onex.evt.omnimarket.overseer-benchmarker-completed.v1
