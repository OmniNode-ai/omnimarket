name: node_memory_lifecycle_orchestrator
version: "0.2.0"
description: "Coordinates memory lifecycle transitions for expiration, archival, and cleanup"
omnibase_core_compat: ">=0.39.0,<1.0.0"
entry_points:
  onex.nodes:
    node_memory_lifecycle_orchestrator: "omnimarket.nodes.node_memory_lifecycle_orchestrator"
capabilities:
