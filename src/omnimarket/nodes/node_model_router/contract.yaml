---
name: model_router
contract_version: {major: 1, minor: 0, patch: 0}
node_type: compute
node_version: {major: 1, minor: 0, patch: 0}

description: >
  Contract-driven LLM endpoint router. Every LLM call in the platform routes
  through this node — no hardcoded model IDs, base URLs, or timeout literals
  in handler source. Endpoints are resolved from model_registry.yaml via
  model_id keys declared in the caller's ModelRoutingPolicy.

handler:
  module: omnimarket.nodes.node_model_router.handlers.handler_model_router
  class: HandlerModelRouter
  input_model: ModelRoutingRequest

handler_routing:
  routing_strategy: operation_match
  handlers:
    - handler:
        name: HandlerModelRouter
        module: omnimarket.nodes.node_model_router.handlers.handler_model_router
      event_model:
        name: ModelRoutingRequest
        module: omnimarket.nodes.node_model_router.models.model_routing_request

descriptor:
  node_archetype: compute
  purity: effectful
  idempotent: false
  timeout_ms: 120000

dependencies:
  - name: "ModelRoutingPolicy"
    type: "config"
    required: true
    module: "omnibase_compat.routing.model_routing_policy"
    description: "Typed routing policy injected into HandlerModelRouter."
  - name: "model_registry"
    type: "config"
    required: true
    source: "model_registry.yaml"
    description: "Contract-owned model endpoint registry injected as HandlerModelRouter registry."

env_dependencies:
  ONEX_CI_MODE:
    required: false
    description: "When set to '1', 'true', or 'yes', activates CI override policy and uses ci_override.primary model instead of the default primary"

model_routing:
  primary: qwen3-coder-30b
  fallback: claude-sonnet
  timeout_per_attempt_s: 60
  max_retries: 2
  reason_for_fallback: "local timeout or unavailable"
  fallback_allowed_roles:
    - reviewer
    - designer
    - fixer
  call_style: async

inputs:
  prompt:
    type: str
    description: "Prompt to route to a model endpoint"
    required: true
  role:
    type: str
    description: "Caller role for fallback authorization"
    required: true
  correlation_id:
    type: str
    description: "Trace/correlation ID"
    required: true

outputs:
  model_key:
    type: str
    description: "Registry model_id key that was selected"
  endpoint_url:
    type: str
    description: "Resolved base URL of the selected endpoint"
  used_fallback:
    type: bool
    description: "True if fallback model was used"

event_bus:
  subscribe_topics: []
  publish_topics:
    - onex.evt.omnimarket.model-routing-degraded.v1

metadata:
  transport_type: kafka
  description: "Contract-driven LLM routing substrate"
  author: "OmniNode Platform Team"
  created: "2026-04-11"
  tags:
    - "routing"
    - "llm"
    - "contract-driven"
    - "OMN-8443"
  related_tickets:
    - "OMN-8443"
    - "OMN-8442"
