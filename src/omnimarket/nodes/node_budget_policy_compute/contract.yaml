---
name: node_budget_policy_compute
contract_version: {major: 1, minor: 0, patch: 0}
node_type: compute
node_version: {major: 1, minor: 0, patch: 0}
description: >
  Pure deterministic budget policy evaluator. Compares context usage (tokens,
  cost, elapsed time) against declared thresholds and returns an EnumBudgetAction
  forcing decision. No side effects, no I/O, no bus or DB dependencies.

handler:
  module: omnimarket.nodes.node_budget_policy_compute.handlers.handler_budget_policy
  class: HandlerBudgetPolicy
  input_model: omnimarket.nodes.node_budget_policy_compute.models.model_budget_policy_request.ModelBudgetPolicyRequest

descriptor:
  node_archetype: compute
  purity: pure
  idempotent: true
  timeout_ms: 500

inputs:
  current_usage:
    type: object
    required: true
    description: Current resource consumption (tokens, cost_usd, elapsed_time_s)
  budget_limits:
    type: object
    required: true
    description: Declared budget ceiling (max_tokens, max_cost_usd, max_time_s)
  task_priority:
    type: str
    required: true
    description: EnumTaskPriority value affecting throttle/abort thresholds

outputs:
  action:
    type: str
    enum: [CONTINUE, WARN, THROTTLE, ABORT]
  reason:
    type: str
  dimensions_exceeded:
    type: array
    items:
      type: str
  recommended_action:
    type: str

terminal_event: onex.evt.omnimarket.budget-policy-completed.v1

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.budget-policy-requested.v1
  publish_topics:
    - onex.evt.omnimarket.budget-policy-completed.v1

metadata:
  transport_type: kafka
