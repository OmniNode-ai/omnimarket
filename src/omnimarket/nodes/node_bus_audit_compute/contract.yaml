---
name: node_bus_audit_compute
contract_version: {major: 1, minor: 1, patch: 0}
node_type: compute
node_version: {major: 1, minor: 1, patch: 0}
description: >
  Audits event bus topic registry declarations against node contract event_bus
  wiring. The node is a deterministic static compute surface; live Kafka
  sampling belongs in a future effect node.

handler:
  module: omnimarket.nodes.node_bus_audit_compute.handlers.handler_bus_audit_compute
  class: HandlerBusAuditCompute
  input_model: omnimarket.nodes.node_bus_audit_compute.models.model_bus_audit_compute_request.ModelBusAuditComputeRequest

descriptor:
  node_archetype: compute
  purity: pure
  idempotent: true
  timeout_ms: 30000

inputs:
  scope:
    type: str
    required: false
    default: local
  registry_path:
    type: str
    required: false
  contract_roots:
    type: list
    required: false
  failures_only:
    type: bool
    required: false
    default: false
  verbose:
    type: bool
    required: false
    default: false
  skip_daemon:
    type: bool
    required: false
    default: false
  broker:
    type: str
    required: false
  sample_count:
    type: int
    required: false
    default: 20
  dry_run:
    type: bool
    required: false
    default: false

outputs:
  status:
    type: str
    enum: [clean, findings, error]
  run_id:
    type: str
  message:
    type: str
  topics_registered:
    type: int
  topics_declared:
    type: int
  contracts_checked:
    type: int
  findings:
    type: list

terminal_event: onex.evt.omnimarket.bus-audit-completed.v1

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.bus-audit-start.v1
  publish_topics:
    - onex.evt.omnimarket.bus-audit-completed.v1
