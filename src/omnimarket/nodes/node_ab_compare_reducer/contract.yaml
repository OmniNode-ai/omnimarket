---
name: ab_compare_reducer
contract_version: {major: 1, minor: 0, patch: 0}
node_type: reducer
node_version: {major: 1, minor: 0, patch: 0}

description: >
  Collects inference results for a correlation_id, calculates costs
  from registry pricing, and emits the completed comparison.

handler:
  module: omnimarket.nodes.node_ab_compare_reducer.handlers.handler_ab_compare_reducer
  class: HandlerAbCompareReducer
  input_model: omnimarket.nodes.node_ab_compare_reducer.models.model_ab_compare_state.ModelAbCompareState

descriptor:
  node_archetype: reducer
  purity: pure
  idempotent: true
  timeout_ms: 30000

event_bus:
  subscribe_topics:
    - onex.evt.omnimarket.ab-inference-completed.v1
  publish_topics:
    - onex.evt.omnimarket.ab-compare-completed.v1

projection_api:
  expose: true
  topic: "onex.snapshot.projection.ab-compare.v1"
  table: "ab_compare_results"
  columns: ["correlation_id", "model_key", "display_name", "prompt_tokens", "completion_tokens", "total_tokens", "cost_usd", "latency_ms", "quality", "error", "created_at"]
  order_by: "created_at DESC"
  freshness_column: "created_at"
  limit: 50
