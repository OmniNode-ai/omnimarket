---
name: node_integration_sweep_orchestrator
contract_version: {major: 1, minor: 0, patch: 0}
node_type: orchestrator
node_version: {major: 1, minor: 0, patch: 0}
description: >
  Writes deterministic integration sweep artifacts for explicit ticket scopes.

handler:
  module: omnimarket.nodes.node_integration_sweep_orchestrator.handlers.handler_integration_sweep_orchestrator
  class: HandlerIntegrationSweepOrchestrator
  input_model: omnimarket.nodes.node_integration_sweep_orchestrator.models.model_integration_sweep_orchestrator_request.ModelIntegrationSweepOrchestratorRequest

env_dependencies:
  ONEX_CC_REPO_PATH:
    required: false
    description: "Path to the omni_home repo registry; used as fallback root when not resolvable from the process environment"

descriptor:
  node_archetype: orchestrator
  purity: impure
  idempotent: true
  timeout_ms: 30000
terminal_event: onex.evt.omnimarket.integration-sweep-completed.v1

config:
  ONEX_CC_REPO_PATH:
    description: "Path to the omniclaude repository for Claude Code plugin operations."
    required: false
