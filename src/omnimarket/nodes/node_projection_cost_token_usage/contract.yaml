---
name: node_projection_cost_token_usage
contract_version: {major: 1, minor: 0, patch: 0}
node_type: REDUCER_GENERIC
node_version: {major: 1, minor: 0, patch: 0}
description: >
  Emits repeatable token usage snapshots for downstream dashboard consumers.

handler:
  module: omnimarket.nodes.node_projection_cost_token_usage.handlers.handler_projection_cost_token_usage
  class: HandlerProjectionCostTokenUsage

handler_routing:
  routing_strategy: payload_type_match
  routes:
    - input_model: omniintelligence.models.events.ModelLLMCallCompletedEvent
      output_model: omniintelligence.models.events.ModelCostTokenUsageSnapshot

idempotency:
  enabled: true
  strategy: snapshot_upsert
  hash_fields:
    - window
    - snapshot_timestamp_minute

event_bus:
  consumer_group: local.omnibase_infra.node_projection_cost_token_usage.consume.v1
  subscribe_topics:
    - onex.evt.omniintelligence.llm-call-completed.v1
  publish_topics:
    - onex.evt.omnimarket.cost-token-usage-snapshot.v1

projection_api:
  expose: true
  topic: "onex.snapshot.projection.cost.token_usage.v1"
  table: "llm_call_metrics"
  columns:
    - "model_id"
    - "prompt_tokens"
    - "completion_tokens"
    - "total_tokens"
    - "estimated_cost_usd"
    - "usage_source"
    - "created_at"
  order_by: "created_at DESC"
  freshness_column: "created_at"
  limit: 100
