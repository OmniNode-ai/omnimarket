---
name: session_phase_dispatcher
contract_version: {major: 1, minor: 0, patch: 0}
node_type: effect
node_version: {major: 1, minor: 0, patch: 0}

description: >
  Receives phase transition commands and publishes phase-state and budget-warning
  events. This is the ONLY node in the session-phase subsystem with side effects.
  It does not evaluate state — that belongs to node_session_phase_evaluator.
  It does not persist state — that belongs to node_session_phase_reducer.

handler:
  module: omnimarket.nodes.node_session_phase_dispatcher.handlers.handler_session_phase_dispatcher
  class: HandlerSessionPhaseDispatcher
  input_model: omnimarket.nodes.node_session_phase_dispatcher.models.model_dispatcher_input.ModelSessionPhaseDispatcherInput

descriptor:
  node_archetype: effect
  purity: impure
  idempotent: false
  timeout_ms: 30000
  runtime_profiles:
    - effects

terminal_event: onex.evt.omnimarket.session-phase-state.v1

event_bus:
  subscribe_topics:
    - onex.cmd.omnimarket.session-phase-transition.v1
  publish_topics:
    - onex.evt.omnimarket.session-phase-state.v1
    - onex.evt.omnimarket.session-phase-budget-warning.v1

dod_evidence:
  PYTEST:
    description: "session phase dispatcher unit tests"
    command: "uv run pytest tests/unit/nodes/node_session_phase_dispatcher/ -q"
    pass_criteria: "all 4 tests pass"

metadata:
  transport_type: kafka
