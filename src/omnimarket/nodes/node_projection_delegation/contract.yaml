---
name: projection_delegation
contract_version: {major: 1, minor: 0, patch: 0}
node_type: reducer
node_version: {major: 1, minor: 0, patch: 0}
description: >
  Projects delegation terminal events into the delegation_events table.
  Dedup by correlation_id. Sources include legacy task-delegated events,
  shadow comparisons, node generation completions, and delegate-skill
  terminal events.

handler:
  module: omnimarket.nodes.node_projection_delegation.handlers.handler_projection_delegation
  class: HandlerProjectionDelegation

terminal_event: onex.evt.omnimarket.projection-delegation-applied.v1

# Golden path: delegation chain (terminal event -> delegation_events table)
golden_path:
  - "Consume delegation terminal event from a contract-declared topic"
  - "Projection handler upserts row into delegation_events table"
  - "Dedup by correlation_id (UPSERT semantics)"
  - "Emit projection-applied event to onex.evt.omnimarket.projection-delegation-applied.v1"
  - "Verify row exists with correlation_id, task_type, delegated_to fields"
  - "Golden chain test: omnimarket/tests/test_golden_chain_projection_delegation.py"

db_io:
  db_tables:
    - name: delegation_events
      migration: "0009_delegate_skill_projection_metrics.sql"
      access: write
      database: omnidash_analytics
      role: events
    - name: delegation_shadow_comparisons
      migration: "0007_delegation_events.sql"
      access: write
      database: omnidash_analytics
      role: shadow_comparisons
    - name: generation_events
      migration: "0008_generation_events.sql"
      access: write
      database: omnidash_analytics
      role: generation_events

event_bus:
  subscribe_topics:
    - onex.evt.omniclaude.task-delegated.v1
    - onex.evt.omniclaude.delegation-shadow-comparison.v1
    - onex.evt.omnimarket.node-generation-completed.v1
    - onex.evt.omnimarket.delegate-skill-completed.v1
    - onex.evt.omnimarket.delegate-skill-failed.v1
  publish_topics:
    - onex.evt.omnimarket.projection-delegation-applied.v1

metadata:
  transport_type: kafka
