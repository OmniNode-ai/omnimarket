title: "Resolve generation consumer endpoint via contract, not env vars"
summary: >
  Remove bespoke GENERATION_CONSUMER_ENDPOINT/MODEL_ID/API_KEY/PROVIDER/ENDPOINT_CLASS
  env vars from node_generation_consumer. Add model_routing section to contract.yaml
  declaring endpoint_env, model_id, and auth. Add dependencies entries so the overlay
  config resolver knows LLM_CODER_URL, LOCAL_LLM_SHARED_SECRET, LLM_ENDPOINT_CIDR_ALLOWLIST
  are required at boot. Handler reads endpoint_env from the contract at construction
  and resolves os.environ[endpoint_env] (LLM_CODER_URL) at call time.
