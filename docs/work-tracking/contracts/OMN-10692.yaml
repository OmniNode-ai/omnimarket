---
schema_version: "1.0.0"
ticket_id: OMN-10692
title: "Extend inference bridge with OpenRouter free-tier support"
summary: >
  Adds OpenRouter free-tier model catalog support to omnimarket inference bridge
  configuration and hardens request construction. OPENROUTER_API_KEY enables
  openrouter/<model_id> entries, OPENROUTER_BASE_URL falls back to the contract
  default when unset or blank, and extra_headers cannot override reserved
  Authorization or Content-Type headers.
is_seam_ticket: false
interface_change: true
interfaces_touched:
