schema_version: "1.0.0"
ticket_id: OMN-10800
title: "fix: HandlerProjectionOvernightPhaseEnd + SessionComplete DI crash-loop — make session_start_handler optional"
summary: >
  HandlerProjectionOvernightPhaseEnd and HandlerProjectionOvernightSessionComplete required
  session_start_handler: HandlerProjectionOvernightSessionStart in __init__, which the declarative
  service_handler_resolver cannot satisfy (no path exists for handler-type constructor deps).
  This caused a TypeError crash-loop on every runtime boot. Fix makes session_start_handler
  optional (default None); each handler instantiates HandlerProjectionOvernightSessionStart()
  internally when no instance is provided. Callers that pass an instance explicitly are unaffected.
