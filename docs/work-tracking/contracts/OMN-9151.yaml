    description: "ValidatorHardcodedTopics passes clean across src/ with markers in place"
    source: "manual"
    checks:
      - check_type: "command"
        check_value: "uv run python -c 'from omnibase_core.validators.validator_hardcoded_topics import ValidatorHardcodedTopics; r = ValidatorHardcodedTopics().validate_path(\"src\"); assert r.passed, r.violations'"
