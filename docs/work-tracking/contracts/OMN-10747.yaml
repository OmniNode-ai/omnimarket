ticket_id: OMN-10747
title: "Inject NodeLlmEvalHarness via DI in NodeOverseerBenchmarker"
summary: >
  NodeOverseerBenchmarker.__init__ always constructed NodeLlmEvalHarness internally
  with no injectable path. Adds a harness: NodeLlmEvalHarness | None = None constructor
  parameter so any harness implementation can be injected; when harness is None the
  previous default behavior is preserved (construct from client or FakeLlmClient). The
  _MinimalCorpusBenchmarker test helper now uses the DI path. Pure constructor-signature
  change inside an offline benchmarking node — no new topology, no migration, no Kafka
  topic changes.
