schema_version: "1.0.0"
ticket_id: OMN-10799
title: "fix: HandlerIntentQuery DI crash-loop — make container param optional"
summary: >
  HandlerIntentQuery required container: ModelONEXContainer in __init__, which the
  declarative service_handler_resolver could not satisfy. This caused a crash-loop on
  every runtime boot. Fix makes container optional (default None) so the resolver can
  construct the handler zero-arg. initialize() raises RuntimeError if called without
  a container, preserving the invariant for real Memgraph callers.
