    description: "Post-merge deploy smoke imports the touched runtime routing surfaces"
    command: "docker exec ${RUNTIME_CONTAINER:-omninode-runtime} python -c \"from omnimarket.nodes.node_build_loop_orchestrator.handlers.adapter_delegation_router import EnumModelTier; from omnimarket.nodes.node_nightly_loop_controller.models.model_nightly_loop import build_default_routing_table; assert EnumModelTier.GEMINI_CLI.value == 'gemini-cli'; assert any(route.model_tier == 'gemini-cli' for route in build_default_routing_table()); print('deploy smoke ok')\""
