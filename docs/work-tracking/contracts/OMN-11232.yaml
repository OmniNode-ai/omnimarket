  Subscribes to onex.evt.omnimarket.session-phase-evaluated.v1 and routes to
  onex.cmd.omnimarket.session-phase-transition.v1 (transition_required) or
  onex.cmd.omnimarket.session-halt-required.v1 (halt_required). no_action and
  budget_warning evaluations produce no events. ORCHESTRATOR contract enforced:
  result must never be set. 6 unit tests. Part of epic OMN-11224.
