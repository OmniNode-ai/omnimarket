  - id: graceful-shutdown-drain-period
    root_paths:
      - omnibase_infra/src/omnibase_infra/runtime
      - omnibase_infra/docs/decisions
    ground_truth_adr: |
      # ADR-001: Graceful Shutdown with Drain Period

      **Status**: Accepted
      **Date**: 2025-12-17

      ## Context

      The RuntimeHostProcess is the central coordinator for ONEX infrastructure runtime,
      managing event bus subscriptions and routing incoming envelopes to protocol handlers.
      When the process receives a shutdown signal, it must handle the transition from active
      message processing to a stopped state.

      Without graceful shutdown, stopping the runtime host could result in in-flight message
      loss, data integrity issues, resource leaks, and inconsistent state in downstream systems.

      ## Decision

      Implement a graceful shutdown mechanism with:

      - Configurable drain timeout (default 30 seconds, valid range 1-300 seconds).
      - Polling-based completion detection with 100ms intervals.
      - Lock-protected pending message counter (asyncio.Lock).
      - Shutdown sequence: unsubscribe from topics then drain period then handler shutdown
        then close event bus.
      - Forced shutdown with warning log if drain timeout is exceeded.

      The polling approach was chosen over asyncio.Event-based signaling for simpler state
      management, better timeout handling, and easier correctness reasoning.

      ## Consequences

      - Clean shutdown: messages in flight are allowed to complete.
      - Potential shutdown delay: up to `drain_timeout_seconds`.
      - Potential message loss on timeout if drain period is exceeded.
      - `pending_message_count` property and `shutdown_ready()` method provide
        observability into drain state.
    models:
      - key: qwen3-coder
        provider: local_vllm
        model_id: cyankiwi/Qwen3-Coder-30B-A3B-Instruct-AWQ-4bit # onex-allow-model-id OMN-10698 reason="canary manifest pins local model under test"
        external: false
