# Ground truth manifest for the ADR extraction canary benchmark.
# canary_version: "1.0.0" (metadata only — kept as comment; ModelGroundTruthManifest only accepts `entries`)
#
# Each entry maps one human-authored ADR to:
#   - root_paths: source documents the extractor should read to discover the decision
#   - ground_truth_adr: the full text of the authoritative ADR (inline)
#   - models: local model configs to evaluate in this canary run
#
# All root_paths are relative to OMNI_HOME (the omni_home repo root).
# allow_external_providers defaults to false — only local models run unless
# the canary command is published with allow_external_providers=true.

entries:
  - id: kafka-required-infrastructure
    root_paths:
      - omnibase_infra/docs/architecture
      - omnibase_infra/docs/event-bus
      - omnibase_infra/src/omnibase_infra/event_bus
    ground_truth_adr: |
      # ADR: Kafka is Required Infrastructure (Rule #8)

      **Status**: Accepted
      **Date**: 2026-02-10

      ## Context

      The platform originally operated under the rule "Never block on Kafka — Kafka is optional;
      operations must succeed without it." This was encoded in the architecture handshake as a
      constraint that all repos observed.

      As the platform matured, Kafka became the sole event transport for inter-node communication,
      projection publishing, DLQ routing, and wiring health monitoring. The "optional Kafka"
      invariant was no longer accurate — every production deployment requires a running Kafka
      cluster, and "graceful degradation" without Kafka meant silently dropping events.

      ## Decision

      **Kafka is required infrastructure** (platform-wide rule #8). Specifically:

      - Connection failures during `start()` raise and must be treated as fatal by callers.
      - There is no "degraded mode" — if Kafka is unreachable, the node cannot operate.
      - Async/non-blocking patterns are still required to avoid blocking the calling thread
        while waiting for Kafka acks.
      - Resilience patterns (circuit breaker, retry with backoff) protect against *transient*
        broker failures, not permanent unavailability.

      This replaces the previous rule "Never block on Kafka."

      ## Consequences

      - Callers of `EventBusKafka.start()` and `ProviderKafkaProducer.create()` must not
        swallow connection errors.
      - Integration tests that previously mocked Kafka away need explicit opt-in for
        Kafka-less testing via markers (`@pytest.mark.no_kafka`).
      - The `localhost:9092` defaults in config models remain as development conveniences but
        must be overridden in deployed environments (per rule #7: no hardcoded configuration).
    models:
      - key: qwen3-coder
        provider: local_vllm
        model_id: cyankiwi/Qwen3-Coder-30B-A3B-Instruct-AWQ-4bit # onex-allow-model-id OMN-10698 reason="canary manifest pins local model under test"
        external: false
      - key: deepseek-r1
        provider: local_vllm
        model_id: Corianas/DeepSeek-R1-Distill-Qwen-14B-AWQ # onex-allow-model-id OMN-10698 reason="canary manifest pins local model under test"
        external: false

  - id: vault-to-infisical-migration
    root_paths:
      - omnibase_infra/docs/decisions
      - omnibase_infra/src/omnibase_infra/handlers
      - omnibase_infra/src/omnibase_infra/runtime/config_discovery
    ground_truth_adr: |
      # ADR-007: Vault to Infisical Migration

      **Status**: Accepted
      **Date**: 2026-02-19

      ## Context

      The ONEX infrastructure originally used HashiCorp Vault (via the `hvac` Python
      client) as the secret management backend. `HandlerVault` implemented secret
      read, write, list, delete, and token-renewal operations against Vault's KV v2
      secrets engine.

      Several pressures made Vault's continued use unsustainable in the ONEX
      development environment:

      - Operational complexity: Vault requires an external unsealing step after every
        restart. For a development and CI environment where containers restart frequently,
        this creates friction and manual intervention.
      - Licensing trajectory: HashiCorp relicensed Vault under the Business Source License
        in 2023.
      - Developer experience: Vault's path convention and token lifecycle management added
        ceremony around every secret read.
      - Bootstrap integration: contract-driven config discovery needed a simpler secret
        prefetch pattern.

      ## Decision

      Replace HashiCorp Vault with Infisical as the sole secret management backend.

      The Vault handler (`HandlerVault`), its models, its error types (`InfraVaultError`,
      `error_vault`), and the Vault mixin family are removed without a compatibility shim.

      HandlerInfisical supports three operations: `infisical.get_secret`,
      `infisical.list_secrets`, and `infisical.get_secrets_batch`.

      Config prefetch from Infisical is opt-in: only executes when `INFISICAL_ADDR` is
      set. Without it, the runtime falls back to standard environment variable resolution.

      ## Consequences

      - Simpler bootstrap: Infisical starts unsealed; no post-restart manual steps.
      - Reduced `.env` surface: the `.env.example` shrank from ~660 lines to ~30.
      - Machine identity auth: no token renewal machinery required.
      - New external dependency: Infisical must be healthy before runtime services start.
      - No secret write operations: HandlerInfisical is read-only.
      - `hvac` Python package removed from dependencies.
    models:
