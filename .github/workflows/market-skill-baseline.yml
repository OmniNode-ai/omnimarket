name: Market Skill Baseline

on:
  pull_request:
    branches: [main]
    paths:
      - "src/omnimarket/market_skill_baseline.py"
      - "src/omnimarket/nodes/**/contract.yaml"
      - "src/omnimarket/nodes/**/__main__.py"
      - "src/omnimarket/nodes/**/handlers/**"
      - "src/omnimarket/nodes/**/models/**"
      - "scripts/run_market_skill_baseline.py"
      - "tests/test_market_skill_smokes.py"
      - "docs/reference/2026-04-28-market-skill-baseline.*"
      - ".github/workflows/market-skill-baseline.yml"
  merge_group:
  workflow_dispatch:

concurrency:
  group: market-skill-baseline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  market-skill-baseline:
    name: market-skill-baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core

      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat

      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run market skill smoke tests
        run: uv run pytest tests/test_market_skill_smokes.py -q

      - name: Run strict market skill baseline
        run: uv run python scripts/run_market_skill_baseline.py --skip-pytest --strict
