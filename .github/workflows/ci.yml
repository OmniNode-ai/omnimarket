name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --locked --all-extras
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
      - name: Stub implementation check
        run: python ../omnibase_core/scripts/validation/check_stub_implementations.py src/
      - name: TODO format check
        run: |
          pip install onex-change-control 2>/dev/null || pip install ../onex_change_control 2>/dev/null || true
          # Inline check: all TODO/FIXME/HACK must have (OMN-XXXX) ticket reference
          find src/ -name '*.py' -not -path '*/tests/*' | while read -r f; do
            grep -nE '#.*\b(TODO|FIXME|HACK)\b' "$f" 2>/dev/null | grep -vE '\b(TODO|FIXME|HACK)\(OMN-[0-9]+\)' | while read -r line; do
              echo "::error file=${f}::${line} -- bare TODO/FIXME/HACK without ticket reference (use: # TODO(OMN-XXXX): description)"
              echo "FAIL" > /tmp/todo_check_failed
            done
          done
          if [ -f /tmp/todo_check_failed ]; then exit 1; fi
      # NOTE: This step requires PR #75 (OMN-7922, fix legacy contracts) to be merged
      # before it is active in CI. The build_loop_orchestrator handler still contains
      # hardcoded onex.evt.* constants until OMN-7922 migrates them to contract-declared
      # topics. This lint was added in OMN-7921 (branched from PR #76 / OMN-7918).
      - name: Topic-literal guardrail
        run: python scripts/lint_no_hardcoded_topics.py
      # OMN-10909: stricter topic-literal gate — allowlist is topics.py, test_* files,
      # and inline `# onex-topic-allow` annotations (delegation thin-shim plan, Task 8).
      - name: Topic-literal guardrail (annotation allowlist)
        run: uv run python scripts/ci/check_no_hardcoded_topics.py
      - name: Reject node-level topics.py files
        run: |
          FOUND=$(find src/omnimarket/nodes -name "topics.py" -path "*/node_*/*" 2>/dev/null)
          if [ -n "$FOUND" ]; then
            echo "ERROR: topics.py files found in node directories. Topic bindings must come from contract.yaml."
            echo "$FOUND"
            exit 1
          fi
          echo "OK: No node-level topics.py files found."
      - name: ONCP node metadata dependency scope
        run: uv run python scripts/ci/check_node_metadata_dependencies.py
      # SYNC: Pre-commit hook 'validate-no-env-fallbacks' at pre-commit stage (OMN-10738)
      # Prevents silent fallback to localhost defaults via os.getenv/os.environ.get
      - name: Validate no silent env fallbacks
        run: uv run python scripts/validation/validate_no_env_fallbacks.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --locked --all-extras
      - name: Mypy strict
        run: uv run mypy src/omnimarket/ --strict

  # ---------------------------------------------------------------------------
  # Detect Changes — emits matrix for test job (OMN-10759)
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      is_full_suite: ${{ steps.detect.outputs.is_full_suite }}
      full_suite_reason: ${{ steps.detect.outputs.full_suite_reason }}
      split_count: ${{ steps.detect.outputs.split_count }}
      matrix: ${{ steps.detect.outputs.matrix }}
      selected_paths: ${{ steps.detect.outputs.selected_paths }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install pyyaml + pydantic (lightweight, no full sync needed)
        run: |
          uv venv --python 3.12
          uv pip install pyyaml pydantic

      - name: Compute changed files
        id: diff
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            git fetch --no-tags --depth=1 origin "$base" || true
            git diff --name-only "$base"...HEAD > changed.txt
          else
            git diff --name-only HEAD~1 HEAD > changed.txt || echo "" > changed.txt
          fi
          echo "Changed files:"
          cat changed.txt

      - name: Resolve test selection
        id: detect
        env:
          FLAG: ${{ vars.ENABLE_SMART_TESTS == 'true' && 'on' || 'off' }}
        run: |
          . .venv/bin/activate
          python -m scripts.ci.detect_test_paths \
            --changed-files-from changed.txt \
            --ref-name "${{ github.ref_name }}" \
            --event-name "${{ github.event_name }}" \
            --feature-flag "$FLAG" \
            > selection.json
          cat selection.json
          is_full=$(python -c "import json; d=json.load(open('selection.json')); print(str(d['is_full_suite']).lower())")
          reason=$(python -c "import json; d=json.load(open('selection.json')); print(d['full_suite_reason'] or '')")
          split_count=$(python -c "import json; d=json.load(open('selection.json')); print(d['split_count'])")
          matrix=$(python -c "import json; d=json.load(open('selection.json')); print(json.dumps(d['matrix']))")
          paths=$(python -c "import json; d=json.load(open('selection.json')); print(json.dumps(d['selected_paths']))")
          echo "is_full_suite=$is_full" >> "$GITHUB_OUTPUT"
          echo "full_suite_reason=$reason" >> "$GITHUB_OUTPUT"
          echo "split_count=$split_count" >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "selected_paths=$paths" >> "$GITHUB_OUTPUT"

  test:
    name: Tests (Split ${{ matrix.split }}/${{ needs.detect-changes.outputs.split_count }})
    needs: [detect-changes]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        split: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --locked --all-extras

      - name: Restore test durations cache
        uses: actions/cache/restore@v4
        with:
          path: .test_durations
          key: test-durations-${{ github.sha }}
          restore-keys: |
            test-durations-

      - name: Run pytest (smart selection)
        if: vars.ENABLE_SMART_TESTS == 'true' && needs.detect-changes.outputs.is_full_suite == 'false'
        run: |
          paths=$(echo '${{ needs.detect-changes.outputs.selected_paths }}' | python -c "import json,sys; print(' '.join(json.load(sys.stdin)))")
          uv run pytest $paths \
            --splits ${{ needs.detect-changes.outputs.split_count }} \
            --group ${{ matrix.split }} \
            -v --tb=short -m "not kafka" \
            --junitxml=junit-${{ matrix.split }}.xml

      - name: Run pytest (full suite)
        if: vars.ENABLE_SMART_TESTS != 'true' || needs.detect-changes.outputs.is_full_suite == 'true'
        run: |
          uv run pytest tests/ \
            --splits ${{ needs.detect-changes.outputs.split_count }} \
            --group ${{ matrix.split }} \
            --store-durations \
            --durations-path .test_durations \
            -v --tb=short -m "not kafka" \
            --junitxml=junit-${{ matrix.split }}.xml

      - name: Save test durations (full suite only, split 1)
        if: |
          needs.detect-changes.outputs.is_full_suite == 'true' &&
          matrix.split == 1 &&
          success()
        uses: actions/cache/save@v4
        with:
          path: .test_durations
          key: test-durations-${{ github.sha }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.split }}
          path: junit-${{ matrix.split }}.xml
          retention-days: 7

  topic-naming-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone omnibase_infra
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_infra.git ../omnibase_infra
      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --locked --all-extras
      - name: Topic naming lint (OMN-8507)
        env:
          OMNIBASE_INFRA_PATH: ../omnibase_infra
        run: |
          uv run python ../omnibase_infra/scripts/validation/lint_topic_names.py \
            --scan-contracts src/omnimarket/nodes \
            --baseline scripts/validation/topic_naming_baseline.txt
          uv run python ../omnibase_infra/scripts/validation/lint_topic_names.py \
            --scan-python src/omnimarket \
            --baseline scripts/validation/topic_naming_baseline.txt

  event-registry-drift:
    name: Event Registry Drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
      - name: Clone omniclaude
        run: git clone --depth=1 https://github.com/OmniNode-ai/omniclaude.git ../omniclaude
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --locked --all-extras
      - name: Validate event registry drift
        run: uv run python -m omnimarket.validators.event_registry_drift --omniclaude-root ../omniclaude

  # ============================================================================
  # RUNTIME SWEEP GATE (OMN-8611)
  # Verifies every onex.nodes entry point in pyproject.toml has a module
  # directory, __init__.py, and contract.yaml. Fails if any are broken.
  # NOTE: This gate must pass on main — land AFTER fix-market-entry-points
  # PR merges (the PR fixing 96 broken entry points).
  # ============================================================================
  runtime-sweep:
    name: Runtime Sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pyyaml
        run: pip install "pyyaml>=6.0"
      - name: Verify entry point wiring
        run: python scripts/ci/run_runtime_sweep.py

  # ============================================================================
  # E2E WORKFLOW RUNNER (inmemory bus)
  # Proves the deterministic node platform works end-to-end on every PR:
  #   - onex node CLI loads a real workflow contract
  #   - RuntimeLocal starts EventBusInmemory, subscribes to terminal topic
  #   - Handler executes and runtime writes workflow_result.json
  #   - Exit code 0 = COMPLETED, evidence on disk
  # No Kafka or Postgres required.
  # ============================================================================

  e2e-workflow-runner:
    name: E2E Workflow Runner (inmemory bus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Clone omnibase_core
        run: |
          OMNIBASE_CORE_SHA=$(git ls-remote https://github.com/OmniNode-ai/omnibase_core.git HEAD | cut -f1)
          git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
          echo "omnibase_core pinned to: $OMNIBASE_CORE_SHA"
      - name: Clone omnibase_compat
        run: |
          OMNIBASE_COMPAT_SHA=$(git ls-remote https://github.com/OmniNode-ai/omnibase_compat.git HEAD | cut -f1)
          git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
          echo "omnibase_compat pinned to: $OMNIBASE_COMPAT_SHA"
      - name: Clone omnimemory
        run: |
          OMNIMEMORY_SHA=$(git ls-remote https://github.com/OmniNode-ai/omnimemory.git HEAD | cut -f1)
          git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
          echo "omnimemory pinned to: $OMNIMEMORY_SHA"
      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --locked --all-extras
      - name: Run golden_chain_sweep workflow E2E
        run: |
          STATE_ROOT=$(mktemp -d)
          if uv run onex node node_golden_chain_sweep \
            --contract golden_chain_sweep_workflow.yaml \
            --backend event_bus=inmemory \
            --state-root "$STATE_ROOT" \
            --timeout 60 \
            --verbose; then
            EXIT=0
          else
            EXIT=$?
          fi
          echo "--- workflow_result.json ---"
          if [ -f "$STATE_ROOT/workflow_result.json" ]; then
            cat "$STATE_ROOT/workflow_result.json"
            if python3 -c "import json,sys; d=json.load(open('$STATE_ROOT/workflow_result.json')); sys.exit(0 if d.get('result')=='completed' else 1)"; then
              EVIDENCE=0
            else
              EVIDENCE=$?
            fi
          else
            EVIDENCE=1
          fi
          if [ $EXIT -ne 0 ] || [ $EVIDENCE -ne 0 ]; then
            echo "::error::E2E workflow run failed: exit=$EXIT evidence_check=$EVIDENCE"
            exit 1
          fi
          echo "E2E PASSED: terminal event received, evidence written, exit=0"
  # ============================================================================
  # GOLDEN CHAIN SUITE
  # Runs all 1,000+ golden chain tests (EventBusInmemory, zero infra) on every PR.
  # These are the platform's canonical correctness proof:
  #   - FSM state machines (build loop, close-out, observe, full modes)
  #   - Event pub/sub field-level assertions through EventBusInmemory
  #   - Handler round-trips: publish -> subscribe -> validate field values
  #   - Circuit breaker, metrics accumulation, mode branching
  # Separate from the main test job so it shows as its own required gate.
  # ============================================================================

  golden-chains:
    name: Golden Chain Suite (inmemory bus)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Clone omnibase_core
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_core.git ../omnibase_core
      - name: Clone omnibase_compat
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnibase_compat.git ../omnibase_compat
      - name: Clone omnimemory
        run: git clone --depth=1 https://github.com/OmniNode-ai/omnimemory.git ../omnimemory
      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync --locked --all-extras
      - name: Run golden chain suite
        run: |
          uv run pytest             tests/test_golden_chain_*.py             tests/unit/nodes/test_golden_chain_*.py             tests/nodes/*/test_golden_chain_*.py             -v --tb=short -q -m "not kafka"             --junit-xml=golden-chain-results.xml
      - name: Upload golden chain results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-chain-results
          path: golden-chain-results.xml

  # ============================================================================
  # GATE AGGREGATOR
  # Required status check for branch protection and merge queue.
  # ============================================================================

  contract-compliance:
    name: Contract Compliance Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'merge_group' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - name: Checkout onex_change_control
        uses: actions/checkout@v6
        with:
          repository: OmniNode-ai/onex_change_control
          path: onex_change_control

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: 'onex_change_control/uv.lock'

      - name: Install onex_change_control
        working-directory: onex_change_control
        run: uv sync --locked --all-extras

      - name: Validate contract YAML files
        working-directory: onex_change_control
        run: |
          CONTRACTS=$(find "$GITHUB_WORKSPACE/onex_change_control/contracts" -name "OMN-*.yaml" 2>/dev/null)
          if [ -z "$CONTRACTS" ]; then
            echo "No contract YAML files found — skipping validation"
            exit 0
          fi
          uv run validate-yaml $CONTRACTS
        env:
          GH_TOKEN: ${{ github.token }}

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, detect-changes, test, topic-naming-lint, runtime-sweep, contract-compliance, e2e-workflow-runner, golden-chains]
    if: always()
    steps:
      - name: Check CI results
        run: |
          echo "=== CI Summary ==="
          FAILED=false

          for check in \
            "lint=${{ needs.lint.result }}" \
            "typecheck=${{ needs.typecheck.result }}" \
            "detect-changes=${{ needs.detect-changes.result }}" \
            "test=${{ needs.test.result }}" \
            "topic-naming-lint=${{ needs.topic-naming-lint.result }}" \
            "runtime-sweep=${{ needs.runtime-sweep.result }}" \
            "contract-compliance=${{ needs.contract-compliance.result }}" \
            "e2e-workflow-runner=${{ needs.e2e-workflow-runner.result }}" \
            "golden-chains=${{ needs.golden-chains.result }}"; do
            NAME="${check%%=*}"
            RESULT="${check##*=}"
            if [ "$RESULT" != "success" ] && [ "$RESULT" != "skipped" ]; then
              echo "::error::$NAME failed (result: $RESULT)"
              FAILED=true
            else
              echo "$NAME: $RESULT"
            fi
          done

          if [ "$FAILED" = "true" ]; then
            echo ""
            echo "CI Summary FAILED"
            exit 1
          fi
          echo ""
          echo "CI Summary PASSED"
