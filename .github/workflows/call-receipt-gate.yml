#
# Caller workflow: invokes the reusable receipt-gate on every PR targeting main.
#
# Receipt-gate (omnibase_core) enforces "Enforcement by Receipt" (OMN-10412):
# every PR must cite a Linear ticket whose dod_evidence items all have PASS
# ModelDodReceipt artifacts in onex_change_control. Missing or failing receipts
# block merge.
#
# Required-status-check name: `verify / verify`

name: Receipt Gate

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    uses: OmniNode-ai/omnibase_core/.github/workflows/receipt-gate.yml@main
