#
# OMN-10580 (hardens OMN-10554): leaked-literals gate — BLOCKING MODE.
#
# This workflow runs `scripts/validation/check_leaked_literals.sh blocking all`
# on every PR and on merge_group entry. Any unannotated leaked literal causes
# exit 1 and blocks merge.
#
# To permit a legitimate occurrence, add an inline annotation on the same line:
#   # onex-allow-internal-ip OMN-XXXXX reason="<concrete reason>"
#   # onex-allow-local-path OMN-XXXXX reason="<concrete reason>"
#   # onex-allow-test-fixture OMN-XXXXX reason="<concrete reason>"
#   # onex-allow-raw-env OMN-XXXXX reason="<concrete reason>"
#   # onex-allow-model-id OMN-XXXXX reason="<concrete reason>"
#
# See docs/leaked-literals-governance.md for the full governance policy.
#
# This job is a REQUIRED STATUS CHECK. The job name
# "Leaked Literals Gate" must match branch protection rules.

name: Leaked Literals Gate

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  leak-gate:
    name: Leaked Literals Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run leak gate in blocking mode
        run: |
          bash scripts/validation/check_leaked_literals.sh blocking all
