evidence_requirements:
  - kind: "manual"
    description: "Focused demo CLI tests pass."
    command: "uv run pytest tests/unit/test_cli_ab_compare_suite.py tests/unit/test_cli_ab_compare.py tests/unit/test_cli_delegation_cost_demo.py tests/unit/test_cli_market_skills_demo.py tests/unit/scripts/test_run_delegation_cost_projection_process.py -q"
