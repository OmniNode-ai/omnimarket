    description: "Repo-local OMN-10457 deploy contract validates."
    command: "uv run validate-yaml contracts/OMN-10457.yaml"
  - kind: "manual"
    description: "Post-merge deploy smoke confirms CLI entry points and AB registry resolution import; no live deploy or runtime restart was performed in this PR."
    command: "docker exec ${RUNTIME_CONTAINER:-omninode-runtime} python -c \"from omnimarket.cli.cli_ab_compare_suite import main as ab_compare_suite; from omnimarket.cli.cli_delegation_cost_demo import main as delegation_cost_demo; from omnimarket.cli.cli_market_skills_demo import main as market_skills_demo; from omnimarket.nodes.node_ab_compare_orchestrator.handlers.handler_ab_compare_orchestrator import HandlerABCompareOrchestrator; print('omnimarket demo cli and registry deploy smoke ok')\""
