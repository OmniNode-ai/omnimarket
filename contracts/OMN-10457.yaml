    description: "Strict mypy passes for the affected CLI modules."
    command: "uv run mypy src/omnimarket/ --strict"
  - kind: "manual"
    description: "Ruff passes for the affected CLI and test modules."
    command: "uv run ruff check src/omnimarket/cli/cli_ab_compare_suite.py src/omnimarket/cli/cli_delegation_cost_demo.py src/omnimarket/cli/cli_market_skills_demo.py tests/unit/test_cli_ab_compare_suite.py tests/unit/test_cli_delegation_cost_demo.py tests/unit/test_cli_market_skills_demo.py tests/unit/scripts/test_run_delegation_cost_projection_process.py"
  - kind: "manual"
    description: "All-registry-model AB suite demo output is captured with the direct transport."
    command: "uv run ab-compare-suite --models all --transport direct --output table --output-file docs/tracking/2026-05-03-ab-compare-suite-all-models.txt"
  - kind: "manual"
    description: "Post-merge deploy smoke confirms CLI entry points import and the safe projection wrapper is present; no live deploy or runtime restart was performed in this PR."
    command: "docker exec ${RUNTIME_CONTAINER:-omninode-runtime} python -c \"from omnimarket.cli.cli_ab_compare_suite import main as ab_compare_suite; from omnimarket.cli.cli_delegation_cost_demo import main as delegation_cost_demo; from omnimarket.cli.cli_market_skills_demo import main as market_skills_demo; print('omnimarket demo cli deploy smoke ok')\""
