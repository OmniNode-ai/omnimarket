  - id: dod-validator-lint-type
    description: "Changed validator files pass ruff and mypy strict"
    source: manual
    checks:
      - check_type: command
        check_value: "uv run ruff check src/omnimarket/validators tests/validators/test_event_registry_drift.py && uv run ruff format --check src/omnimarket/validators tests/validators/test_event_registry_drift.py && uv run mypy src/omnimarket/validators/event_registry_drift.py tests/validators/test_event_registry_drift.py --strict --show-error-codes"
  - id: dod-validator-precommit
