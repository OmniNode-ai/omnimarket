    checks:
      - check_type: command
        check_value: "OMNIBASE_INFRA_PATH=/Users/jonah/Code/omni_home/omnibase_infra pre-commit run --files .github/workflows/ci.yml .pre-commit-config.yaml scripts/validation/event_registry_drift_baseline.txt src/omnimarket/validators/__init__.py src/omnimarket/validators/event_registry_drift.py tests/validators/test_event_registry_drift.py"
